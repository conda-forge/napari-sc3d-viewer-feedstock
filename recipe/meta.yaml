{% set name = "napari-sc3d-viewer" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5574fe7c66fd5069e8e2d0da2f5dfd9d3bf05080f745d599934197ae49985368

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - magicgui
    - matplotlib-base
    - napari
    - numpy
    - python >={{ python_min }}
    - qtpy
    - sc-3d

test:
  imports:
    - napari_sc3d_viewer
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - pyqt
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-sc3D-viewer/
  summary: A plugin to visualize 3D single cell omics
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/GuignardLab/napari-sc3D-viewer

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
    - leoguignard
